name: CancelOrder - order does not exist
description: POST /orders/{orderId}/cancel must return 404 when no order matches the specified ID
requests:
  cancel_order:
    description: Cancel a non-existent order
    method: post
    url: "{{env:CAAS_BASE_URL}}/orders/583920417651209834/cancel"
    headers:
      x-api-key: "{{env:CAAS_API_KEY}}"
    body: {}
assertions:
  - property: cancel_order
    type: status_code
    value: 404
  - property: cancel_order.code
    type: is_equals
    value: 404
  - property: cancel_order.message
    type: is_equals
    value: Order does not exist
